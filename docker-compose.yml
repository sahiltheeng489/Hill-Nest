services:
  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hillnest_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hillnest_admin
      POSTGRES_USER: hillnest_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hillnest_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hillnest_admin -d hillnest_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hillnest_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-hillnest_redis_dev} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-hillnest_redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB (existing) ────────────────────────────────────────
  # Using hosted Atlas — no local container needed
  # (comment out if you want local MongoDB instead)

  # ── Admin Backend Service ─────────────────────────────────────
  admin-backend:
    build:
      context: ./backend/admin
      dockerfile: Dockerfile
      target: development
    container_name: hillnest_admin_backend
    restart: unless-stopped
    env_file:
      - ./backend/admin/.env
    environment:
      DATABASE_URL: postgresql://hillnest_admin:${POSTGRES_PASSWORD:-hillnest_dev_password}@postgres:5432/hillnest_admin
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hillnest_redis_dev}
      NODE_ENV: development
    volumes:
      - ./backend/admin:/app
      - /app/node_modules
      - admin_logs:/app/logs
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm run dev:setup && npm run dev"

  # ── Customer Backend (existing) ───────────────────────────────
  customer-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.customer
    container_name: hillnest_customer_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  # ── Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: hillnest_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_ADMIN_API_URL: http://localhost:5001/api/admin
      NEXT_PUBLIC_API_URL: ""
      BACKEND_URL: http://customer-backend:5000
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - admin-backend
      - customer-backend
    command: npm run dev

  # ── MinIO (S3-compatible local storage) ───────────────────────
  minio:
    image: minio/minio:latest
    container_name: hillnest_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hillnest_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-hillnest_minio_secret}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  admin_logs:
    driver: local
  minio_data:
    driver: local

networks:
  default:
    name: hillnest_network

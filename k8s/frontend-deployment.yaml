apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: hillnest
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: frontend
          image: hillnest/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_ADMIN_API_URL
              valueFrom:
                configMapKeyRef:
                  name: hillnest-config
                  key: admin-api-url
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: hillnest-config
                  key: api-url
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: hillnest
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hillnest-ingress
  namespace: hillnest
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - hillnest.in
        - api.hillnest.in
      secretName: hillnest-tls
  rules:
    - host: hillnest.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 3000
    - host: api.hillnest.in
      http:
        paths:
          - path: /api/admin
            pathType: Prefix
            backend:
              service:
                name: admin-backend-svc
                port:
                  number: 5001
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: customer-backend-svc
                port:
                  number: 5000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hillnest-config
  namespace: hillnest
data:
  admin-api-url: "https://api.hillnest.in/api/admin"
  api-url: "https://api.hillnest.in/api"
  admin-frontend-url: "https://hillnest.in"

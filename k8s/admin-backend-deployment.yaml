apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-backend
  namespace: hillnest
  labels:
    app: admin-backend
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: admin-backend
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: admin-backend-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: admin-backend
          image: hillnest/admin-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "5001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hillnest-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: hillnest-secrets
                  key: redis-url
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: hillnest-secrets
                  key: jwt-access-secret
            - name: MFA_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: hillnest-secrets
                  key: mfa-encryption-key
            - name: ADMIN_FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: hillnest-config
                  key: admin-frontend-url
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: admin-backend-svc
  namespace: hillnest
spec:
  selector:
    app: admin-backend
  ports:
    - port: 5001
      targetPort: 5001
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-backend-sa
  namespace: hillnest
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: admin-backend-pdb
  namespace: hillnest
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: admin-backend
